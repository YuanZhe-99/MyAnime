flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  image_path_ios: "assets/icon/app_icon_ios.png"
  image_path_ios_dark_transparent: "assets/icon/app_icon_ios_dark.png"
  image_path_ios_tinted_grayscale: "assets/icon/app_icon_ios_tinted.png"
  desaturate_tinted_to_grayscale_ios: true
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
