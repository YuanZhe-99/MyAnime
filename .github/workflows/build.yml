name: Build All Platforms

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  # ── Android APK (full) + AAB (store) ──
  android:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter pub get

      - name: Setup Android signing
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > android/key.properties

      - name: Build APK (full)
        run: flutter build apk --release --dart-define=FLAVOR=full

      - name: Build AAB (store)
        run: flutter build appbundle --release --dart-define=FLAVOR=store

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-full
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab-store
          path: build/app/outputs/bundle/release/app-release.aab

  # ── Windows x64 installer (full) ──
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter pub get

      - name: Build Windows x64 (full)
        run: flutter build windows --release --dart-define=FLAVOR=full

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer (x64)
        run: iscc installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer-x64-full
          path: build/installer/*.exe

  # ── Windows ARM64 installer (full, Flutter master — stable ARM64 engine in master since flutter/flutter#176385,
  #    merged March 2026; will land in a future stable release. Until then, use cached master weekly
  #    so the same flutter_windows_arm64.dll hash is reused across builds, allowing Defender cloud
  #    reputation to accumulate. Without caching, every build produces a fresh unknown hash → false positive.) ──
  windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      # Pin Flutter master to a weekly window so the same DLL hashes are produced on every
      # build within the week → identical hashes accumulate Defender cloud reputation.
      # Once a Flutter stable/beta with ARM64 engine is released, switch to subosito/flutter-action
      # with channel: stable and remove this caching block.
      - name: Get weekly Flutter cache key
        id: cache-key
        shell: pwsh
        run: echo "week=$(Get-Date -UFormat '%G-W%V')" >> $env:GITHUB_OUTPUT

      - name: Cache Flutter master (weekly)
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}\flutter-master
          key: flutter-master-arm64-${{ steps.cache-key.outputs.week }}

      - name: Setup Flutter master (ARM64 engine only on master)
        shell: pwsh
        run: |
          $flutterDir = "$env:RUNNER_TOOL_CACHE\flutter-master"
          if (-not (Test-Path "$flutterDir\bin\flutter")) {
            git clone https://github.com/flutter/flutter.git `
              --branch master --depth 1 `
              "$flutterDir"
          }
          Add-Content $env:GITHUB_PATH "$flutterDir\bin"

      - name: Flutter doctor
        run: flutter doctor

      - run: flutter pub get

      - name: Build Windows ARM64 (full)
        run: flutter build windows --release --dart-define=FLAVOR=full

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer (ARM64)
        run: iscc /DARM64 installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer-arm64-full
          path: build/installer/*.exe

  # ── iOS IPA (full sideload + store) ──
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter pub get

      - name: Build iOS (full, no codesign)
        run: flutter build ios --release --no-codesign --dart-define=FLAVOR=full

      - name: Package sideload IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r MyAnime_sideload.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-full-sideload
          path: build/ios/ipa/MyAnime_sideload.ipa

  # ── macOS DMG (full) ──
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: flutter pub get

      - name: Add macOS platform if missing
        run: |
          if [ ! -d macos ]; then
            flutter create --platforms=macos .
          fi

      - name: Build macOS (full)
        run: flutter build macos --release --dart-define=FLAVOR=full

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          create-dmg \
            --volname "MyAnime!!!!!" \
            --app-drop-link 400 150 \
            "build/macos/MyAnime.dmg" \
            "$APP_PATH" || true

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-full
          path: build/macos/MyAnime.dmg

  # ── Create GitHub Release on tag push ──
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [android, windows-x64, windows-arm64, ios, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.exe" -o -name "*.ipa" -o -name "*.dmg" \) -exec cp {} release/ \;

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
